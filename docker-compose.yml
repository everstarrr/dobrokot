services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: dobrokot
      MYSQL_USER: dobrokot
      MYSQL_PASSWORD: dobrokot_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: mysql://dobrokot:dobrokot_pass@mysql:3306/dobrokot
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: dobrokot
      DATABASE_PASSWORD: dobrokot_pass
      DATABASE_NAME: dobrokot
      DATABASE_CONNECTION_LIMIT: 5
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      PORT: 4000
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXT_PUBLIC_API_URL: http://api:4000/api
    depends_on:
      - api

volumes:
  mysql_data:
