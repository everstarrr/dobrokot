services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DATABASE_NAME:?DATABASE_NAME is required}
      MYSQL_USER: ${DATABASE_USER:?DATABASE_USER is required}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-init:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: "no"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    # Call Prisma directly — the runner image has no pnpm-workspace.yaml and
    # runs as a non-root user, so `pnpm --filter ...` ends up trying to
    # `pnpm install` and fails with EACCES on /app.
    working_dir: /app/apps/api
    command:
      - /app/apps/api/node_modules/.bin/prisma
      - migrate
      - deploy
      - --config
      - prisma.config.ts
    depends_on:
      mysql:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
      api-init:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mysql_data:
